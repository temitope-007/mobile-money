# docker-compose.yml
#
# Local development environment for sublime247/mobile-money.
# Starts the app alongside Postgres and Redis with live-reload via ts-node.
#
# Usage:
#   docker compose up          # start everything
#   docker compose up -d       # start in background
#   docker compose down        # stop and remove containers
#   docker compose down -v     # stop and wipe volumes (fresh DB)

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: mobilemoney_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mobilemoney_stellar
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./database/migrations:/docker-entrypoint-initdb.d/migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d mobilemoney_stellar"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # Redis
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: mobilemoney_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ---------------------------------------------------------------------------
  # Application (live reload via ts-node-dev)
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: mobilemoney_app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Override the localhost URLs from .env to use Docker service names
      DATABASE_URL: postgresql://user:password@postgres:5432/mobilemoney_stellar
      REDIS_URL: redis://redis:6379
      LOG_FILE_PATH: /var/log/mobile-money/app.log
      ELASTICSEARCH_URL: http://elasticsearch:9200
      KIBANA_URL: http://kibana:5601
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      # Mount source so edits reflect immediately without rebuilding
      - .:/app
      - /app/node_modules
      - app_logs:/var/log/mobile-money
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      logstash:
        condition: service_started

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.2
    container_name: mobilemoney_elasticsearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://localhost:9200/_cluster/health || exit 1",
        ]
      interval: 15s
      timeout: 10s
      retries: 20

  logstash:
    image: docker.elastic.co/logstash/logstash:8.12.2
    container_name: mobilemoney_logstash
    restart: unless-stopped
    depends_on:
      elasticsearch:
        condition: service_healthy
    ports:
      - "5044:5044"
    volumes:
      - ./elk/logstash/pipeline:/usr/share/logstash/pipeline:ro
      - ./elk/logstash/templates:/usr/share/logstash/templates:ro

  filebeat:
    image: docker.elastic.co/beats/filebeat:8.12.2
    container_name: mobilemoney_filebeat
    user: root
    restart: unless-stopped
    depends_on:
      logstash:
        condition: service_started
    command: ["filebeat", "-e", "--strict.perms=false"]
    volumes:
      - ./elk/filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - app_logs:/var/log/mobile-money:ro

  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.2
    container_name: mobilemoney_kibana
    restart: unless-stopped
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
      XPACK_SECURITY_ENABLED: "false"
    depends_on:
      elasticsearch:
        condition: service_healthy
    ports:
      - "5601:5601"
    volumes:
      - kibana_data:/usr/share/kibana/data
    healthcheck:
      test:
        ["CMD-SHELL", "curl -fsS http://localhost:5601/api/status || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 20

  kibana-importer:
    image: curlimages/curl:8.7.1
    container_name: mobilemoney_kibana_importer
    restart: "no"
    depends_on:
      kibana:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/scripts/import-kibana.sh"]
    volumes:
      - ./elk/scripts/import-kibana.sh:/scripts/import-kibana.sh:ro
      - ./elk/kibana/mobile-money-dashboard.ndjson:/usr/share/kibana/import/mobile-money-dashboard.ndjson:ro

volumes:
  postgres_data:
  redis_data:
  app_logs:
  elasticsearch_data:
  kibana_data:
